name: CI

on:
  push:
    branches: [main]
    # 仅当「代码相关」路径变更时触发；文档/编辑器配置等改动不跑 CI
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "config/**"
      - "i18n/**"
      - "messages/**"
      - "public/**"
      - "src-tauri/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "biome.json"
      - "components.json"
      - "tsconfig.json"
      - "next.config.ts"
      - "next-env.d.ts"
      - "postcss.config.mjs"
      - ".npmrc"
      - ".nvmrc"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    # 与 push 保持一致：仅代码相关变更触发
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "config/**"
      - "i18n/**"
      - "messages/**"
      - "public/**"
      - "src-tauri/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "biome.json"
      - "components.json"
      - "tsconfig.json"
      - "next.config.ts"
      - "next-env.d.ts"
      - "postcss.config.mjs"
      - ".npmrc"
      - ".nvmrc"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cargo clippy
        working-directory: src-tauri
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo fmt check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_DB: test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cargo test
        working-directory: src-tauri
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: cargo test --all-features

  build:
    name: Build (${{ matrix.os }})
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          # CI 阶段仅验证 Linux 能编译，节省 macOS(×10)/Windows(×2) 额度
          # 真正的全平台打包交给 release.yml（仅在打 tag 时触发）
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          # 在普通的 CI 流水线中，临时禁用 Updater 包生成，避免因为找不到私钥而构建失败
          args: >-
            --target ${{ matrix.target }} --config '{"bundle": {"createUpdaterArtifacts": false}}'
